[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
IVR_RESPONSE_TIMEOUT=7
IVR_DIGIT_TIMEOUT=5

[from-supplier-ip]
exten => _X!,1,NoOp(Inbound call. EXTEN=${EXTEN} from ${CHANNEL(peerip)})
 same => n,Set(DID=${FILTER(0-9,${EXTEN})})
 same => n,GotoIf($["${DID}" = ""]?s,1)
 same => n,Goto(did-routing,${DID},1)

exten => _+X!,1,Set(DID=${FILTER(0-9,${EXTEN})})
 same => n,Goto(did-routing,${DID},1)

exten => s,1,NoOp(No DID in EXTEN, checking To header)
 same => n,Set(TO_HDR=${PJSIP_HEADER(read,To)})
 same => n,Set(DID=${FILTER(0-9,${CUT(CUT(${TO_HDR},@,1),:,2)})})
 same => n,GotoIf($["${DID}" != ""]?did-routing,${DID},1)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Hangup()

