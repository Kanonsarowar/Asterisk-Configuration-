; ================================
; DID routing + IVR dialplan
; ================================
; Incoming IP-auth calls hit context: from-supplier-ip
; and are routed by DID to IVR/service destinations.

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
IVR_RESPONSE_TIMEOUT=7
IVR_DIGIT_TIMEOUT=5

[from-supplier-ip]
; Most providers deliver DID in Request-URI as ${EXTEN}
exten => _X!,1,NoOp(Inbound call from supplier. Raw EXTEN=${EXTEN})
 same => n,Set(DID=${FILTER(0-9,${EXTEN})})
 same => n,GotoIf($["${DID}" = ""]?extract_from_to_header,1)
 same => n,Goto(did-routing,${DID},1)

; Some providers include a leading "+" in DID
exten => _+X!,1,NoOp(Inbound call from supplier. Raw EXTEN=${EXTEN})
 same => n,Set(DID=${FILTER(0-9,${EXTEN})})
 same => n,GotoIf($["${DID}" = ""]?extract_from_to_header,1)
 same => n,Goto(did-routing,${DID},1)

; Fallback if provider sends call to 's' and DID is in SIP To header
exten => extract_from_to_header,1,NoOp(Extract DID from SIP To header)
 same => n,Set(TO_HDR=${PJSIP_HEADER(read,To)})
 same => n,Set(DID_RAW=${CUT(CUT(${TO_HDR},@,1),:,2)})
 same => n,Set(DID=${FILTER(0-9,${DID_RAW})})
 same => n,GotoIf($["${DID}" = ""]?no-did,1)
 same => n,Goto(did-routing,${DID},1)

exten => s,1,Goto(extract_from_to_header,1)

exten => no-did,1,NoOp(No DID found in request; rejecting call)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

[did-routing]
; Replace sample DIDs below with your real DIDs
exten => 12025550100,1,NoOp(Route DID ${EXTEN} to main IVR)
 same => n,Goto(ivr-main,s,1)

exten => 12025550101,1,NoOp(Route DID ${EXTEN} to sales IVR)
 same => n,Goto(ivr-sales,s,1)

exten => 12025550102,1,NoOp(Route DID ${EXTEN} direct to support)
 same => n,Goto(support-ring,s,1)

exten => _X.,1,NoOp(Unknown or unmapped DID: ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup()

[ivr-main]
exten => s,1,NoOp(Main IVR start)
 same => n,Answer()
 same => n,Set(TIMEOUT(response)=${IVR_RESPONSE_TIMEOUT})
 same => n,Set(TIMEOUT(digit)=${IVR_DIGIT_TIMEOUT})
 same => n(loop),Background(custom/main-menu)
 same => n,WaitExten(5)

exten => 1,1,Goto(sales-ring,s,1)
exten => 2,1,Goto(support-ring,s,1)
exten => 0,1,Goto(operator-ring,s,1)

exten => i,1,Playback(pbx-invalid)
 same => n,Goto(s,loop)

exten => t,1,Playback(vm-goodbye)
 same => n,Hangup()

[ivr-sales]
exten => s,1,NoOp(Sales IVR start)
 same => n,Answer()
 same => n,Set(TIMEOUT(response)=${IVR_RESPONSE_TIMEOUT})
 same => n,Set(TIMEOUT(digit)=${IVR_DIGIT_TIMEOUT})
 same => n(loop),Background(custom/sales-menu)
 same => n,WaitExten(5)

exten => 1,1,Goto(sales-ring,s,1)
exten => 2,1,Goto(operator-ring,s,1)

exten => i,1,Playback(pbx-invalid)
 same => n,Goto(s,loop)

exten => t,1,Playback(vm-goodbye)
 same => n,Hangup()

[sales-ring]
exten => s,1,NoOp(Dial Sales Agent)
 same => n,Dial(PJSIP/2001,25)
 same => n,Voicemail(2001@default,u)
 same => n,Hangup()

[support-ring]
exten => s,1,NoOp(Dial Support Agent)
 same => n,Dial(PJSIP/2002,25)
 same => n,Voicemail(2002@default,u)
 same => n,Hangup()

[operator-ring]
exten => s,1,NoOp(Dial Operator)
 same => n,Dial(PJSIP/2000,25)
 same => n,Voicemail(2000@default,u)
 same => n,Hangup()

; Optional outbound route using same IP-auth trunk
[from-internal]
exten => _X.,1,NoOp(Outbound call via supplier trunk to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@supplier-trunk,60)
 same => n,Hangup()
