[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
IVR_RESPONSE_TIMEOUT=7
IVR_DIGIT_TIMEOUT=5

[from-supplier-ip]
; Normal format: 963966341001
exten => _X!,1,NoOp(Inbound ${EXTEN} from ${CHANNEL(peerip)})
; Force CLI to 966 prefix
 same => n,GotoIf($["${CALLERID(num):0:3}" != "966"]?setcli)
 same => n,Goto(parsedid)
 same => n(setcli),Set(CALLERID(num)=966${RAND(500000000,599999999)})
 same => n(parsedid),Set(DID=${FILTER(0-9,${EXTEN})})
; Strip 00 prefix
 same => n,Set(DID=${IF($["${DID:0:2}" = "00"]?${DID:2}:${DID})})
 same => n,Goto(did-routing,${DID},1)

; +prefix format
exten => _+X!,1,Set(DID=${FILTER(0-9,${EXTEN})})
 same => n,Goto(did-routing,${DID},1)

; 00 prefix format
exten => _00X!,1,Set(DID=${EXTEN:2})
 same => n,Goto(did-routing,${DID},1)

; Any other (s, empty) — answer directly
exten => _X,1,Goto(ivr-1,s,1)
exten => s,1,Goto(ivr-1,s,1)

