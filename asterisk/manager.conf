; Asterisk Manager Interface (AMI) — Phase 2 carrier-api integration
; Deploy: sudo cp /workspace/asterisk/manager.conf /etc/asterisk/manager.conf
; Then:   sudo asterisk -rx "manager reload"
; Or full restart: sudo systemctl restart asterisk
;
; Verify listener: sudo ss -tlnp | grep 5038

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[carrier]
secret = strongpassword
read = all
write = all
