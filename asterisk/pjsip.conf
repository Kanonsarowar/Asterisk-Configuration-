; ================================
; PJSIP - IP Authentication Trunk
; ================================

[global]
type=global
user_agent=Asterisk-IPAuth-IVR

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=167.172.170.88
external_signaling_address=167.172.170.88
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

[supplier-trunk]
type=endpoint
transport=transport-udp
context=from-supplier-ip
disallow=all
allow=g729,alaw,ulaw,gsm
aors=supplier-trunk-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
trust_id_inbound=yes
send_pai=yes
t38_udptl=no

[supplier-trunk-aor]
type=aor
contact=sip:108.61.70.46:5060
qualify_frequency=60

; --- Supplier 1 (Vultr) ---
[identify-supplier-1-vultr]
type=identify
endpoint=supplier-trunk
match=108.61.70.46

; --- Supplier 2 (Hetzner) ---
[identify-supplier-2-hetzner]
type=identify
endpoint=supplier-trunk
match=157.90.193.196

