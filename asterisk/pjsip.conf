; ================================
; PJSIP trunk (IP-to-IP authentication)
; ================================
; Replace these placeholders before use:
; - SUPPLIER_IP        -> SIP provider/source IP
; - YOUR_PUBLIC_IP     -> public IP of this Asterisk server (if behind NAT)
;
; This setup uses IP authentication (identify/match), not username/password.

[global]
type=global
user_agent=Asterisk-IPAuth-IVR

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

[supplier-trunk]
type=endpoint
transport=transport-udp
context=from-supplier-ip
disallow=all
allow=alaw,ulaw
aors=supplier-trunk-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
trust_id_inbound=yes
send_pai=yes
t38_udptl=no

[supplier-trunk-aor]
type=aor
contact=sip:SUPPLIER_IP:5060
qualify_frequency=60

[supplier-trunk-identify]
type=identify
endpoint=supplier-trunk
match=SUPPLIER_IP/32
