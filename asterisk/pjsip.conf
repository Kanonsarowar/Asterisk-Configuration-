; ================================
; PJSIP trunk (IP-to-IP authentication)
; ================================
; Auto-generated by Asterisk Dashboard

[global]
type=global
user_agent=Asterisk-IPAuth-IVR

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

[supplier-trunk]
type=endpoint
transport=transport-udp
context=from-supplier-ip
disallow=all
allow=alaw,ulaw
aors=supplier-trunk-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
trust_id_inbound=yes
send_pai=yes
t38_udptl=no

[supplier-trunk-aor]
type=aor
contact=sip:127.0.0.1:5060
qualify_frequency=60

[supplier-trunk-identify]
type=identify
endpoint=supplier-trunk
match=127.0.0.1/32
