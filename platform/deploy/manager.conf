; Asterisk Manager Interface (AMI) — Phase 2 carrier-api
; Copy into Asterisk config (same content as repo root asterisk/manager.conf):
;
;   sudo cp /opt/carrier-api/deploy/manager.conf /etc/asterisk/manager.conf
;   sudo asterisk -rx "manager reload"
;   sudo systemctl restart asterisk
;
; Verify: sudo ss -tlnp | grep 5038

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[carrier]
secret = strongpassword
read = all
write = all
