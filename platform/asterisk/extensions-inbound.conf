;
; Dialplan — Single-VPS Wholesale Inbound DID Platform
;
; Call flow:
;   Carrier → [from-carrier] → ODBC DID lookup → route dispatch
;     → sip_endpoint | ivr | queue | voicemail | failover
;   CDR push to platform API via hangup handler
;
; Asterisk handles billing triggers, recording, and CDR via
; hangup handler → HTTP POST to internal API.
;

[general]
static = yes
writeprotect = no
priorityjumping = no
autofallthrough = yes
clearglobalvars = no

[globals]
PLATFORM_API=http://127.0.0.1:3010
INTERNAL_API_KEY=iprn-internal-key-change-in-production
RECORDING_PATH=/var/spool/asterisk/recording
MAX_CALL_DURATION=7200
RING_TIMEOUT=30

; ============================================================
; FROM-CARRIER — entry for all carrier-originated inbound calls
; ============================================================
[from-carrier]
exten => _X.,1,NoOp(== INBOUND from ${CHANNEL(peerip)} => ${EXTEN} CLI=${CALLERID(num)} ==)
 same => n,Set(CDR(src)=${CALLERID(num)})
 same => n,Set(CDR(dst)=${EXTEN})
 same => n,Set(__CARRIER_IP=${CHANNEL(peerip)})
 same => n,Set(TIMEOUT(absolute)=${GLOBALS(MAX_CALL_DURATION)})
 same => n,Set(CHANNEL(hangup_handler_push)=h-billing,s,1)
 same => n,Goto(did-lookup,${EXTEN},1)

exten => i,1,NoOp(Invalid extension in from-carrier)
 same => n,Hangup(21)

; ============================================================
; DID LOOKUP — ODBC query against did_inventory + clients
; ============================================================
[did-lookup]
exten => _X.,1,NoOp(DID lookup: ${EXTEN})
 same => n,Set(DID_NUM=${EXTEN})
 same => n,Set(ARRAY(DID_ID,CLIENT_ID,RATE_PER_MIN,ROUTE_TYPE,ROUTE_TARGET,FAILOVER,IVR_ID,DO_RECORD,CLIENT_BALANCE,CLIENT_BILLING,CLIENT_STATUS)=${ODBC_DID_LOOKUP(${DID_NUM})})
 same => n,NoOp(DID=${DID_ID} Client=${CLIENT_ID} Route=${ROUTE_TYPE}/${ROUTE_TARGET} Rate=${RATE_PER_MIN} Balance=${CLIENT_BALANCE})
 same => n,GotoIf($["${DID_ID}" = ""]?no-did,s,1)
 same => n,GotoIf($["${CLIENT_STATUS}" != "active"]?client-suspended,s,1)
 same => n,GotoIf($["${CLIENT_BILLING}" = "prepaid" & ${CLIENT_BALANCE} <= 0]?balance-depleted,s,1)
 same => n,Set(CDR(accountcode)=${CLIENT_ID})
 same => n,Set(CDR(userfield)=did_id=${DID_ID},rate=${RATE_PER_MIN})
 same => n,Set(__DID_ID=${DID_ID})
 same => n,Set(__CLIENT_ID=${CLIENT_ID})
 same => n,Set(__RATE_PER_MIN=${RATE_PER_MIN})
 same => n,GotoIf($["${DO_RECORD}" = "1"]?record-and-route)
 same => n,Goto(route-dispatch,${EXTEN},1)
 same => n(record-and-route),MixMonitor(${GLOBALS(RECORDING_PATH)}/${UNIQUEID}.wav,ab)
 same => n,Goto(route-dispatch,${EXTEN},1)

[no-did]
exten => s,1,NoOp(No DID found for ${DID_NUM})
 same => n,Hangup(21)

[client-suspended]
exten => s,1,NoOp(Client ${CLIENT_ID} suspended)
 same => n,Hangup(21)

[balance-depleted]
exten => s,1,NoOp(Client ${CLIENT_ID} balance depleted)
 same => n,Hangup(21)

; ============================================================
; ROUTE DISPATCH — fan out to correct handler
; ============================================================
[route-dispatch]
exten => _X.,1,NoOp(Route dispatch: type=${ROUTE_TYPE} target=${ROUTE_TARGET})
 same => n,GotoIf($["${ROUTE_TYPE}" = "sip_endpoint"]?route-sip,${EXTEN},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "ivr"]?route-ivr,${IVR_ID},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "queue"]?route-queue,${ROUTE_TARGET},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "voicemail"]?route-vm,${ROUTE_TARGET},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "failover"]?route-failover,${EXTEN},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "time_condition"]?route-tc,${ROUTE_TARGET},1)
 same => n,NoOp(Unknown route type: ${ROUTE_TYPE})
 same => n,Hangup(21)

; ============================================================
; SIP ENDPOINT — Dial customer registered device
; ============================================================
[route-sip]
exten => _X.,1,NoOp(SIP route to customer endpoint ${ROUTE_TARGET})
 same => n,Set(DIAL_TARGET=PJSIP/customer-${ROUTE_TARGET})
 same => n,Dial(${DIAL_TARGET},${GLOBALS(RING_TIMEOUT)},tTg)
 same => n,NoOp(Dial status: ${DIALSTATUS})
 same => n,GotoIf($["${FAILOVER}" != ""]?exec-failover,${EXTEN},1)
 same => n,Hangup(16)

; ============================================================
; IVR — Play prompt, collect DTMF, route per option
; ============================================================
[route-ivr]
exten => _X.,1,NoOp(IVR menu ${EXTEN})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(IVR_FILE=custom/ivr-${EXTEN})
 same => n,Set(IVR_RETRIES=0)
 same => n(play),Background(${IVR_FILE})
 same => n,WaitExten(10)
 same => n,Set(IVR_RETRIES=$[${IVR_RETRIES}+1])
 same => n,GotoIf($[${IVR_RETRIES} < 3]?play)
 same => n,Hangup()

exten => _X,1,NoOp(IVR option ${EXTEN} selected)
 same => n,Goto(ivr-action,${EXTEN},1)

exten => i,1,Playback(invalid)
 same => n,Goto(route-ivr,${IVR_ID},play)

exten => t,1,NoOp(IVR timeout)
 same => n,Hangup()

[ivr-action]
exten => _X,1,NoOp(IVR DTMF action placeholder for digit ${EXTEN})
 same => n,Hangup()

; ============================================================
; QUEUE — ACD queue
; ============================================================
[route-queue]
exten => _X.,1,NoOp(Queue ${EXTEN})
 same => n,Answer()
 same => n,Queue(q-${EXTEN},tTc,,,300)
 same => n,NoOp(Queue status: ${QUEUESTATUS})
 same => n,GotoIf($["${FAILOVER}" != ""]?exec-failover,${EXTEN},1)
 same => n,Hangup()

; ============================================================
; VOICEMAIL
; ============================================================
[route-vm]
exten => _X.,1,NoOp(Voicemail box ${EXTEN})
 same => n,Answer()
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; ============================================================
; FAILOVER — secondary destination on primary failure
; ============================================================
[route-failover]
exten => _X.,1,NoOp(Failover chain for ${EXTEN})
 same => n,Dial(PJSIP/customer-${ROUTE_TARGET},${GLOBALS(RING_TIMEOUT)},tTg)
 same => n,GotoIf($["${FAILOVER}" != ""]?exec-failover,${EXTEN},1)
 same => n,Hangup()

[exec-failover]
exten => _X.,1,NoOp(Executing failover to ${FAILOVER})
 same => n,Dial(PJSIP/customer-${FAILOVER},${GLOBALS(RING_TIMEOUT)},tTg)
 same => n,Hangup()

; ============================================================
; TIME CONDITION — business hours check
; ============================================================
[route-tc]
exten => _X.,1,NoOp(Time condition ${EXTEN})
 same => n,GotoIfTime(09:00-17:00,mon-fri,*,*?tc-match,${EXTEN},1)
 same => n,Goto(tc-nomatch,${EXTEN},1)

[tc-match]
exten => _X.,1,NoOp(Business hours — routing to primary)
 same => n,GotoIf($["${ROUTE_TARGET}" != ""]?route-sip,${EXTEN},1)
 same => n,Hangup()

[tc-nomatch]
exten => _X.,1,NoOp(After hours — routing to failover/voicemail)
 same => n,GotoIf($["${FAILOVER}" != ""]?exec-failover,${EXTEN},1)
 same => n,Goto(route-vm,${EXTEN},1)

; ============================================================
; REJECT UNMATCHED — catch-all for unknown sources
; ============================================================
[reject-unmatched]
exten => _X.,1,NoOp(Rejecting unmatched call from ${CHANNEL(peerip)})
 same => n,Hangup(21)

; ============================================================
; FROM-CUSTOMER — outbound calls from registered SIP endpoints
; ============================================================
[from-customer]
exten => _X.,1,NoOp(Outbound from customer: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CDR(accountcode)=${CHANNEL(endpoint)})
 same => n,Set(CHANNEL(hangup_handler_push)=h-billing,s,1)
 same => n,Hangup(21)

; ============================================================
; HANGUP BILLING HANDLER — CDR push to platform API
; ============================================================
[h-billing]
exten => s,1,NoOp(Hangup handler: CDR ingest for ${UNIQUEID})
 same => n,Set(BILL_SECS=${CDR(billsec)})
 same => n,Set(CALL_DISP=${CDR(disposition)})
 same => n,Set(CDR_PAYLOAD={"uniqueid":"${UNIQUEID}","call_id":"${UNIQUEID}","src":"${CDR(src)}","dst":"${CDR(dst)}","did_number":"${DID_NUM}","provider_id":null,"client_id":${IF($["${CLIENT_ID}"!=""]?${CLIENT_ID}:null)},"start_time":"${CDR(start)}","answer_time":"${CDR(answer)}","end_time":"${CDR(end)}","duration":${CDR(duration)},"disposition":"${CALL_DISP}","rate_per_min":${IF($["${RATE_PER_MIN}"!=""]?${RATE_PER_MIN}:0)},"carrier_ip":"${CARRIER_IP}","sip_code":"${HANGUPCAUSE}","recording_file":"${IF($["${MIXMONITOR_FILENAME}"!=""]?${MIXMONITOR_FILENAME}:null)}"})
 same => n,TrySystem(curl -s -X POST -H "Content-Type: application/json" -H "X-Internal-Key: ${GLOBALS(INTERNAL_API_KEY)}" -d '${CDR_PAYLOAD}' ${GLOBALS(PLATFORM_API)}/internal/cdr)
 same => n,Return()

; Include generated extension configs
#include "extensions.d/*.conf"
