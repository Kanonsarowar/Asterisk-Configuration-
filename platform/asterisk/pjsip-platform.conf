;
; PJSIP configuration — Wholesale Inbound DID Platform
; Asterisk listens on :5080 (behind Kamailio on :5060)
; All carrier-facing SIP handled by Kamailio; Asterisk receives
; pre-authenticated INVITEs with X-DID-Id / X-Customer-Id / X-Rate headers.
;

; ============================================================
; TRANSPORT — Asterisk binds :5080 for Kamailio relay
; ============================================================

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5080
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16
local_net = 127.0.0.0/8

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5080

; ============================================================
; KAMAILIO TRUNK — accept relayed INVITEs from local Kamailio
; ============================================================

[kamailio-trunk]
type = endpoint
context = from-kamailio
transport = transport-udp
disallow = all
allow = g729
allow = alaw
allow = ulaw
allow = gsm
direct_media = no
force_rport = yes
rewrite_contact = yes
rtp_symmetric = yes
ice_support = no
trust_id_inbound = yes
send_pai = yes

[kamailio-trunk-aor]
type = aor
max_contacts = 1

[kamailio-trunk-identify]
type = identify
endpoint = kamailio-trunk
match = 127.0.0.1

; ============================================================
; CUSTOMER SIP ENDPOINTS — dynamically generated by platform API
; via config sync. Template for reference:
; ============================================================
;
; [customer-XXXX]
; type = endpoint
; context = from-customer
; transport = transport-udp
; auth = customer-XXXX-auth
; aors = customer-XXXX-aor
; disallow = all
; allow = g729,alaw,ulaw
; direct_media = no
; force_rport = yes
; rewrite_contact = yes
; rtp_symmetric = yes
; callerid_privacy = allowed_not_screened
;
; [customer-XXXX-auth]
; type = auth
; auth_type = userpass
; username = <sip_endpoint.username>
; password = <sip_endpoint.password>
;
; [customer-XXXX-aor]
; type = aor
; max_contacts = 2
; qualify_frequency = 30
;
; [customer-XXXX-identify]
; type = identify
; endpoint = customer-XXXX
; match = <allowed_ips from sip_endpoints table>
;

; Include generated endpoint configs
#include "pjsip.d/*.conf"
