;
; PJSIP — Single-VPS Wholesale Inbound DID Platform
;
; Asterisk handles all SIP directly on :5060.
; Carriers connect via IP authentication (no registration).
; Customer SIP endpoints register via username/password.
;
; Provider and customer endpoint sections are generated by the
; platform API config-sync service from the DB tables:
;   providers → carrier PJSIP identify blocks
;   sip_accounts → customer endpoint/auth/aor sections
;

[global]
type = global
max_forwards = 70
user_agent = IPRN-Platform/3.0
default_outbound_endpoint = default-endpoint

; ============================================================
; TRANSPORTS
; ============================================================

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16
local_net = 127.0.0.0/8
tos = cs3
cos = 3

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060
tos = cs3
cos = 3

; ============================================================
; DEFAULT ENDPOINT (catch-all for unmatched)
; ============================================================

[default-endpoint]
type = endpoint
context = reject-unmatched
disallow = all
allow = ulaw

; ============================================================
; CARRIER ENDPOINT TEMPLATE
; ============================================================
; Applied to every upstream carrier / traffic provider.
; Carriers send INVITEs with DIDs in the To/RURI.
; IP-authenticated via identify sections.

[carrier-template](!)
type = endpoint
context = from-carrier
transport = transport-udp
disallow = all
allow = g729
allow = alaw
allow = ulaw
allow = gsm
direct_media = no
force_rport = yes
rewrite_contact = yes
rtp_symmetric = yes
ice_support = no
trust_id_inbound = yes
send_pai = yes
inband_progress = yes
t38_udptl = no
timers = yes
timers_sess_expires = 1800

; ============================================================
; CUSTOMER ENDPOINT TEMPLATE
; ============================================================
; Applied to customer SIP devices that register to receive calls.
; Registration-based auth via auth/aor sections.

[customer-template](!)
type = endpoint
context = from-customer
transport = transport-udp
disallow = all
allow = g729
allow = alaw
allow = ulaw
direct_media = no
force_rport = yes
rewrite_contact = yes
rtp_symmetric = yes
ice_support = no
callerid_privacy = allowed_not_screened
device_state_busy_at = 2
timers = yes
timers_sess_expires = 1800

; ============================================================
; GENERATED CONFIGS — loaded from DB by platform API
; ============================================================
; Include carrier and customer endpoint configs:
;   pjsip.d/carrier-*.conf    (one per provider row)
;   pjsip.d/customer-*.conf   (one per sip_account row)
;
; Each carrier file contains:
;   [carrier-N](carrier-template) + [carrier-N-identify] type=identify match=<IP>
;
; Each customer file contains:
;   [customer-N](customer-template) auth=... aors=...
;   [customer-N-auth] type=auth auth_type=userpass
;   [customer-N-aor] type=aor max_contacts=<max_channels> qualify_frequency=30
;
#include "pjsip.d/*.conf"
