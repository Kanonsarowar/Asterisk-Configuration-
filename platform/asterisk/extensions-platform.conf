;
; Asterisk Dialplan — Wholesale Inbound DID Platform
;
; Entry point: [from-kamailio] receives pre-authenticated INVITEs
; from Kamailio with X-DID-Id, X-Customer-Id, X-Rate, X-Carrier-IP headers.
;
; Routing chain:
;   from-kamailio → did-route-dispatch → (sip_endpoint | ivr-N | queue-N |
;                                          voicemail-N | time-condition-N | failover)
;
; Billing hooks use CDR variables; the platform API CDR ingest endpoint
; finalizes financial records post-call.
;

[general]
static = yes
writeprotect = no

; ============================================================
; GLOBALS
; ============================================================
[globals]
PLATFORM_API=http://127.0.0.1:3010
INTERNAL_API_KEY=change-this-for-asterisk-agi-internal-calls
RECORDING_PATH=/var/spool/asterisk/recording
MAX_CALL_DURATION=7200
DEFAULT_RING_TIMEOUT=30

; ============================================================
; FROM-KAMAILIO — entry point for carrier-originated calls
; ============================================================
[from-kamailio]
exten => _X.,1,NoOp(Inbound call from Kamailio: ${EXTEN})
 same => n,Set(CDR(src)=${CALLERID(num)})
 same => n,Set(CDR(dst)=${EXTEN})
 same => n,Set(__DID_ID=${SIP_HEADER(X-DID-Id)})
 same => n,Set(__CUSTOMER_ID=${SIP_HEADER(X-Customer-Id)})
 same => n,Set(__RATE_PER_MIN=${SIP_HEADER(X-Rate)})
 same => n,Set(__CARRIER_IP=${SIP_HEADER(X-Carrier-IP)})
 same => n,Set(CDR(accountcode)=${CUSTOMER_ID})
 same => n,Set(CDR(userfield)=did_id=${DID_ID},rate=${RATE_PER_MIN})
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-billing,s,1)
 same => n,Set(TIMEOUT(absolute)=${MAX_CALL_DURATION})
 same => n,GotoIf($["${DID_ID}" = ""]?no-did,1)
 same => n,Goto(did-route-dispatch,${EXTEN},1)

exten => no-did,1,NoOp(No DID header — rejecting)
 same => n,Hangup(21)

; ============================================================
; DID ROUTE DISPATCH — HTTP lookup to platform for route config
; ============================================================
[did-route-dispatch]
exten => _X.,1,NoOp(DID route dispatch for ${EXTEN}, DID_ID=${DID_ID})
 same => n,Set(CURL_RESULT=${CURL(${PLATFORM_API}/route/${EXTEN},,,X-Internal-Key:${INTERNAL_API_KEY})})
 same => n,GotoIf($["${CURL_RESULT}" = ""]?route-fail,s,1)
 same => n,Set(ROUTE_TYPE=${CUT(CURL_RESULT,|,1)})
 same => n,Set(ROUTE_TARGET=${CUT(CURL_RESULT,|,2)})
 same => n,Set(FAILOVER_TARGET=${CUT(CURL_RESULT,|,3)})
 same => n,NoOp(Route: type=${ROUTE_TYPE} target=${ROUTE_TARGET} failover=${FAILOVER_TARGET})
 same => n,GotoIf($["${ROUTE_TYPE}" = "sip_endpoint"]?route-sip,${EXTEN},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "ivr"]?route-ivr,${ROUTE_TARGET},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "queue"]?route-queue,${ROUTE_TARGET},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "voicemail"]?route-voicemail,${ROUTE_TARGET},1)
 same => n,GotoIf($["${ROUTE_TYPE}" = "time_condition"]?route-time-condition,${ROUTE_TARGET},1)
 same => n,Goto(route-fail,s,1)

; ============================================================
; ROUTE: SIP ENDPOINT — Dial customer registered SIP device
; ============================================================
[route-sip]
exten => _X.,1,NoOp(SIP route to endpoint ${ROUTE_TARGET})
 same => n,Set(DIAL_STR=PJSIP/${ROUTE_TARGET})
 same => n,MixMonitor(${RECORDING_PATH}/${UNIQUEID}.wav,ab)
 same => n,Dial(${DIAL_STR},${DEFAULT_RING_TIMEOUT},tTgG)
 same => n,NoOp(Dial result: ${DIALSTATUS})
 same => n,GotoIf($["${FAILOVER_TARGET}" != ""]?failover-exec,${EXTEN},1)
 same => n,Goto(route-fail,s,1)

; ============================================================
; ROUTE: IVR — Play IVR audio, collect DTMF
; ============================================================
[route-ivr]
exten => _X.,1,NoOp(IVR slot ${EXTEN})
 same => n,Answer()
 same => n,Set(IVR_AUDIO=custom/ivr-${EXTEN})
 same => n,MixMonitor(${RECORDING_PATH}/${UNIQUEID}.wav,ab)
 same => n,Background(${IVR_AUDIO})
 same => n,WaitExten(10)
 same => n,Hangup()

exten => i,1,Playback(invalid)
 same => n,Goto(route-ivr,${IVR_SLOT},1)

exten => t,1,NoOp(IVR timeout)
 same => n,Hangup()

; ============================================================
; ROUTE: QUEUE — Ring group / ACD queue
; ============================================================
[route-queue]
exten => _X.,1,NoOp(Queue ${EXTEN})
 same => n,Answer()
 same => n,MixMonitor(${RECORDING_PATH}/${UNIQUEID}.wav,ab)
 same => n,Queue(queue-${EXTEN},tTc,,,300)
 same => n,NoOp(Queue result: ${QUEUESTATUS})
 same => n,GotoIf($["${FAILOVER_TARGET}" != ""]?failover-exec,${EXTEN},1)
 same => n,Hangup()

; ============================================================
; ROUTE: VOICEMAIL
; ============================================================
[route-voicemail]
exten => _X.,1,NoOp(Voicemail box ${EXTEN})
 same => n,Answer()
 same => n,MixMonitor(${RECORDING_PATH}/${UNIQUEID}.wav,ab)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; ============================================================
; ROUTE: TIME CONDITION — business hours check
; ============================================================
[route-time-condition]
exten => _X.,1,NoOp(Time condition ${EXTEN})
 same => n,GotoIfTime(*,*,*,*?time-match,${EXTEN},1)
 same => n,Goto(time-nomatch,${EXTEN},1)

[time-match]
exten => _X.,1,NoOp(Time condition matched — route to business hours target)
 same => n,Goto(did-route-dispatch,${EXTEN},1)

[time-nomatch]
exten => _X.,1,NoOp(Time condition not matched — after hours)
 same => n,GotoIf($["${FAILOVER_TARGET}" != ""]?failover-exec,${EXTEN},1)
 same => n,Goto(route-voicemail,${EXTEN},1)

; ============================================================
; FAILOVER — secondary destination on primary failure
; ============================================================
[failover-exec]
exten => _X.,1,NoOp(Failover to ${FAILOVER_TARGET})
 same => n,Dial(PJSIP/${FAILOVER_TARGET},${DEFAULT_RING_TIMEOUT},tTgG)
 same => n,Hangup()

; ============================================================
; ROUTE FAILURE — no valid route found
; ============================================================
[route-fail]
exten => s,1,NoOp(Route lookup failed or no route configured)
 same => n,Congestion(5)
 same => n,Hangup(21)

; ============================================================
; HANGUP BILLING HANDLER — POST CDR to platform API
; ============================================================
[hangup-billing]
exten => s,1,NoOp(Hangup handler: billing CDR push)
 same => n,Set(BILL_DURATION=${CDR(billsec)})
 same => n,Set(CALL_DISPOSITION=${CDR(disposition)})
 same => n,Set(CDR_JSON={"call_id":"${UNIQUEID}","uniqueid":"${UNIQUEID}","cli":"${CDR(src)}","destination":"${CDR(dst)}","start_time":"${CDR(start)}","answer_time":"${CDR(answer)}","end_time":"${CDR(end)}","duration":${CDR(duration)},"billed_duration":${BILL_DURATION},"disposition":"${CALL_DISPOSITION}","customer_id":${IF($["${CUSTOMER_ID}"!=""]?${CUSTOMER_ID}:null)},"matched_prefix":"${DID_ID}"})
 same => n,TrySystem(curl -s -X POST -H "Content-Type: application/json" -H "X-Internal-Key: ${INTERNAL_API_KEY}" -d '${CDR_JSON}' ${PLATFORM_API}/api/cdr/ingest)
 same => n,Return()

; ============================================================
; FROM-CUSTOMER — outbound calls from registered SIP endpoints
; ============================================================
[from-customer]
exten => _X.,1,NoOp(Outbound from customer endpoint: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CDR(accountcode)=${CHANNEL(endpoint)})
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-billing,s,1)
 same => n,Goto(outbound-routing,${EXTEN},1)

[outbound-routing]
exten => _X.,1,NoOp(Outbound routing for ${EXTEN})
 same => n,Hangup(21)

; Include generated extension configs
#include "extensions.d/*.conf"
