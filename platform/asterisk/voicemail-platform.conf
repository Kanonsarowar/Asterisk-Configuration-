;
; Asterisk Voicemail — Wholesale Platform
;

[general]
format = wav49|wav
serveremail = noreply@iprn-platform.local
attach = yes
skipms = 3000
maxsilence = 10
silencethreshold = 128
maxlogins = 3
maxmsg = 100
minmessage = 3
maxsecs = 300
maxgreet = 60
emailsubject = New voicemail from ${VM_CALLERID}
emailbody = You have a new ${VM_DUR} long voicemail in mailbox ${VM_MAILBOX} from ${VM_CALLERID} on ${VM_DATE}.
emaildateformat = %A, %B %d, %Y at %r
pollmailboxes = yes
pollfreq = 15

[default]
; Voicemail boxes are created by the platform API and referenced
; by DID routing. Format: mailbox => password,name,email,pager,options
;
; Example generated entries:
; 1001 => 1234,Customer Office,admin@customer.com,,tz=eastern
; 1002 => 5678,Support Line,support@customer.com,,tz=eastern
