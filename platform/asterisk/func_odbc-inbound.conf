;
; func_odbc — DID lookup for inbound call routing
;
; Returns: DID_ID, CLIENT_ID, RATE_PER_MIN, ROUTE_TYPE, ROUTE_TARGET,
;          FAILOVER_TARGET, IVR_ID, RECORDING, CLIENT_BALANCE,
;          CLIENT_BILLING_TYPE, CLIENT_STATUS
;
; DSN 'iprn' must be configured in /etc/odbc.ini pointing to MySQL 'iprn' database.
;

[DID_LOOKUP]
dsn=iprn
readsql=SELECT CONCAT_WS(',', d.id, IFNULL(d.client_id,''), IFNULL(d.rate_per_minute,0), IFNULL(d.route_type,''), IFNULL(d.route_target,''), IFNULL(d.failover_target,''), IFNULL(d.ivr_id,''), d.recording, IFNULL(c.balance,0), IFNULL(c.billing_type,'prepaid'), IFNULL(c.status,'active')) FROM did_inventory d LEFT JOIN clients c ON c.id = d.client_id WHERE d.did_number = '${ARG1}' AND d.status = 'assigned' LIMIT 1

[SIP_ENDPOINT_LOOKUP]
dsn=iprn
readsql=SELECT CONCAT_WS(',', sa.id, sa.username, sa.password, sa.codecs, sa.max_channels, sa.transport, c.balance) FROM sip_accounts sa LEFT JOIN clients c ON c.id = sa.client_id WHERE sa.id = '${ARG1}' AND sa.status = 'active' LIMIT 1

[PROVIDER_BY_IP]
dsn=iprn
readsql=SELECT CONCAT_WS(',', p.id, p.name, p.cost_per_minute, p.connection_fee, p.max_cps) FROM providers p WHERE p.host = '${ARG1}' AND p.status IN ('active','testing') LIMIT 1
