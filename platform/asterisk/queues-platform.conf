;
; Asterisk Queue Configuration — Wholesale Platform
; Queue definitions are generated by the platform API config sync.
; This file provides defaults and is included by queues.conf.
;

[general]
persistentmembers = yes
autofill = yes
monitor-type = MixMonitor
shared_lastcall = yes
log_membername_as_agent = yes

; ============================================================
; DEFAULT QUEUE TEMPLATE
; ============================================================
[queue-template](!)
musicclass = default
strategy = ringall
timeout = 30
retry = 5
wrapuptime = 5
maxlen = 0
weight = 0
announce-frequency = 30
announce-holdtime = once
joinempty = yes
leavewhenempty = no
ringinuse = no
timeoutrestart = yes
servicelevel = 60

; Generated queue configs are included from extensions.d/
; Example generated queue:
; [queue-1](queue-template)
; member => PJSIP/customer-1001
; member => PJSIP/customer-1002
