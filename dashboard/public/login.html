<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — IPRN Business Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .login-card h1 { font-size: 22px; margin-bottom: 4px; }
    .login-card p { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
    .login-card .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .login-card .brand svg { color: #3b82f6; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none; }
    .form-control:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #2563eb; }
    .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <div>
        <h1>IPRN Business Console</h1>
        <p style="margin-bottom:0">Number inventory, DID routing &amp; Asterisk — one login</p>
      </div>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input class="form-control" id="username" type="text" placeholder="admin" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" id="password" type="password" placeholder="Password">
      </div>
      <button class="btn" type="submit">Sign In</button>
      <div class="error" id="error-msg">Invalid username or password</div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.ok) {
        if (data.autoApply != null) {
          try {
            sessionStorage.setItem('dashAfterLogin', JSON.stringify(data.autoApply));
          } catch {
            /* ignore */
          }
        }
        window.location.href = '/';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    };
  </script>
</body>
</html>
