<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gulf-Premium-Telecom</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <div>
          <h1>Gulf-Premium-Telecom</h1>
          <span>IPRN · numbers &amp; voice network</span>
        </div>
      </div>
      <nav class="sidebar-nav sidebar-nav--panel" id="nav-panel" aria-label="Main navigation">
        <!-- Filled by nav-config.js (grouped sections) -->
      </nav>
      <nav class="sidebar-nav" id="nav-tenant" style="display:none">
        <button class="nav-item active" data-page="tenant-dashboard">Overview</button>
        <button class="nav-item" data-page="tenant-live-calls">Live calls</button>
        <button class="nav-item" data-page="tenant-cdr">CDR</button>
        <button class="nav-item" data-page="tenant-billing">Balance</button>
        <button class="nav-item" data-page="tenant-invoices">Invoices</button>
        <button class="nav-item tenant-client-only" data-page="tenant-subusers" style="display:none">Subusers</button>
        <button class="nav-item tenant-client-only" data-page="tenant-numbers" style="display:none">Number allocation</button>
        <button class="nav-item" data-page="tenant-call-generator">Call generator</button>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="btn-icon mobile-menu-btn" id="btn-menu" aria-label="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="page-title">Dashboard</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="server-status" style="font-size:13px;color:var(--text-muted)"></span>
          <button class="btn btn-outline btn-sm" id="btn-logout">Logout</button>
        </div>
      </header>
      <div class="content" id="content">
        <p class="empty-state" id="boot-placeholder">Starting dashboard…</p>
      </div>
    </div>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Apply Banner -->
  <div class="apply-banner" id="apply-banner">
    <span class="msg">You have unsaved changes. Apply to update configs and reload Asterisk.</span>
    <button class="btn btn-success" id="btn-apply">Apply & Reload Asterisk</button>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toasts"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
